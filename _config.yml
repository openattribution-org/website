# Jekyll Configuration for OpenAttribution GitHub Pages

# Site settings
title: OpenAttribution
description: Open standards for AI content transparency
url: https://openattribution.org
baseurl: ""

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    default_lang: json

# Exclude from processing
exclude:
  - README.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

# Include markdown files and static assets in aims directory
include:
  - aims
  - "*.json"

# Keep static files during build
keep_files:
  - aims/examples

# Defaults for AIMS spec pages
defaults:
  - scope:
      path: "aims/spec"
      type: "pages"
    values:
      layout: "spec"
  - scope:
      path: "aims/appendices"
      type: "pages"
    values:
      layout: "spec"

# Disable Jekyll plugins we don't need
plugins: []
